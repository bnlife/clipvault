<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ClipVault — 1000条数据分析</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; }
body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #f2f2f7; color: #1a1a1a;
    max-width: 430px; margin:0 auto; padding-bottom: 40px;
}
header {
    background: #fff; padding: 14px 16px 0;
    position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 19px; font-weight: 700; margin-bottom: 2px; }
header .sub { font-size: 11px; color: #999; margin-bottom: 10px; }

/* tabs */
.tabs { display:flex; gap: 0; }
.tab {
    flex:1; padding: 10px 4px; border: none; background: none;
    font-size: 13px; color: #999; cursor: pointer; text-align: center;
    border-bottom: 2px solid transparent;
}
.tab.on { color: #0984e3; border-bottom-color: #0984e3; font-weight: 600; }

/* panels */
.panel { display: none; padding: 14px 16px; }
.panel.active { display: block; }

/* stats */
.stats {
    display:flex; gap:6px; margin-bottom:16px;
}
.stat {
    flex:1; background:#fff; border-radius:10px; padding:14px 10px; text-align:center;
}
.stat .n { font-size:22px; font-weight:700; color:#0984e3; }
.stat .l { font-size:10px; color:#999; margin-top:2px; }

/* search */
.search-wrap { margin-bottom:14px; }
.search-wrap input {
    width:100%; border:1px solid #e0e0e0; border-radius:10px; padding:10px 14px;
    font-size:15px; background:#fff; outline:none;
}
.search-wrap input:focus { border-color:#0984e3; }

/* cards */
.card {
    background:#fff; border-radius:10px; padding:14px; margin-bottom:10px;
    border:1px solid #f0f0f0;
}
.card .title { font-size:14px; font-weight:600; margin-bottom:4px; line-height:1.4; }
.card .meta { font-size:11px; color:#999; margin-bottom:6px; display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.card .body { font-size:13px; color:#555; line-height:1.65; }

/* tag */
.tg { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:500; }
.tg-blue { background:#e8f4fd; color:#0984e3; }
.tg-red { background:#ffe8e8; color:#d63031; }
.tg-green { background:#e8ffe8; color:#00b894; }
.tg-orange { background:#fff3e8; color:#e17055; }

/* section label */
.sec-label {
    font-size:12px; font-weight:600; color:#888; margin:16px 0 8px 0;
    padding-left:8px; border-left:3px solid #0984e3;
}

/* trend bars */
.t-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; }
.t-name { width:90px; text-align:right; color:#555; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.t-bar-w { flex:1; height:24px; background:#f0f0f0; border-radius:5px; overflow:hidden; }
.t-bar-f { height:100%; border-radius:5px; display:flex; align-items:center; padding-left:8px; color:#fff; font-size:11px; font-weight:600; }
.t-chn { width:40px; font-size:11px; text-align:left; flex-shrink:0; }

/* compare */
.diff-grid { display:flex; gap:8px; margin-bottom:8px; }
.diff-col { flex:1; background:#fff; border-radius:8px; padding:10px; border:1px solid #f0f0f0; }
.diff-col.hl { border:2px solid #0984e3; background:#f0f7ff; }
.diff-col .dl { font-size:10px; color:#999; margin-bottom:3px; }
.diff-col .dv { font-size:12px; color:#333; line-height:1.5; }

/* timeline */
.tline { margin-bottom:14px; }
.tline-hd { display:flex; justify-content:space-between; margin-bottom:4px; }
.tline-mo { font-size:13px; font-weight:600; color:#555; }
.tline-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:2px; }
.tline-tag { display:inline-block; padding:3px 8px; border-radius:12px; font-size:11px; color:#fff; margin-bottom:3px; }
.tline-sum { font-size:11px; color:#999; margin-top:2px; margin-bottom:10px; }
</style>
</head>

// ============================================================
//  TABS
// ============================================================
function switchPanel(idx, btn) {
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    document.getElementById("p"+idx).classList.add("active");
    if(idx===0) renderCluster(document.getElementById("s0").value);
    if(idx===1) renderTrends();
    if(idx===2) renderCompare();
    if(idx===3) renderTimeline();
}

// ============================================================
//  PANEL 0: 案例聚类
// ============================================================
function renderCluster(q) {
    let rows = DB;
    if (q) {
        const kw = q.toLowerCase().split(/\s+/).filter(Boolean);
        rows = rows.filter(r => kw.some(w =>
            r.t.includes(w) || r.tg.some(g=>g.includes(w)) || r.s.includes(w)
        ));
    }
    // group by first tag
    const grp = {};
    rows.forEach(r => {
        const k = r.tg[0];
        if (!grp[k]) grp[k] = [];
        grp[k].push(r);
    });

    let h = "";
    for (const [k,list] of Object.entries(grp)) {
        h += `<div class="sec-label">${k} · ${list.length}条</div>`;
        list.forEach(r => {
            h += `<div class="card">
                <div class="title">${r.t} <span style="font-size:10px;color:#999;">· ${r.m}</span></div>
                <div class="meta">
                    ${r.hot?`<span class="tg tg-red">🔥 爆款</span>`:`<span class="tg tg-blue">⭐ 热门</span>`}
                    ${r.tg.map(g=>`<span class="tg tg-blue">${g}</span>`).join(" ")}
                </div>
                <div class="body">${r.s}</div>
            </div>`;
        });
    }
    document.getElementById("c0").innerHTML = h || `<div style="text-align:center;padding:40px;color:#bbb;">没有匹配的案例</div>`;
}
document.getElementById("s0").addEventListener("input", function(){
    renderCluster(this.value);
});

// ============================================================
//  PANEL 1: 趋势
// ============================================================
function renderTrends() {
    const up = [
        {tag:"武侠+传统文化",p:12,c:35},
        {tag:"反差+日常",p:8,c:26},
        {tag:"探店+美食",p:22,c:30},
        {tag:"银发+潮流",p:3,c:12},
        {tag:"海外+文化输出",p:5,c:14},
    ];
    const dn = [
        {tag:"纯口播知识",p:28,c:21},
        {tag:"剧情段子",p:18,c:13},
    ];
    const hotTags = ["武侠","反差","舞蹈","探店","带货","传统文化","宿舍","银发","海外","非遗"];
    const maxUp = Math.max(...up.map(u=>Math.max(u.p,u.c)));
    const maxDn = Math.max(...dn.map(u=>Math.max(u.p,u.c)));

    function bars(arr, max, upClr) {
        return arr.map(a=>{
            const pct = Math.round((a.c/max)*100);
            const clr = upClr ? "#00b894" : "#d63031";
            const arrow = upClr ? "↑" : "↓";
            const chg = Math.abs(a.c-a.p);
            return `<div class="t-row">
                <div class="t-name">${a.tag}</div>
                <div class="t-bar-w"><div class="t-bar-f" style="width:${pct}%;background:${clr}">${a.c}条</div></div>
                <div class="t-chn" style="color:${clr}">${arrow}${chg}</div>
            </div>`;
        }).join("");
    }
    document.getElementById("t-up").innerHTML = bars(up, maxUp, true);
    document.getElementById("t-dn").innerHTML = bars(dn, maxDn, false);

    // hot tags cloud
    document.getElementById("t-hot").innerHTML = hotTags.map(t=>{
        const cnt = DB.filter(r=>r.tg.includes(t)).length;
        const sz = 12 + cnt*2;
        return `<span style="display:inline-block;margin:3px 5px;padding:5px 10px;background:#e8f4fd;color:#0984e3;border-radius:12px;font-size:${sz}px;font-weight:600;">${t}(${cnt})</span>`;
    }).join("");
}

// ============================================================
//  PANEL 2: 对比
// ============================================================
function renderCompare() {
    const idx = parseInt(document.getElementById("s2").value);
    const target = DB[idx];
    const others = DB.filter((_,i)=>i!==idx)
        .map(r=>({...r, overlap: r.tg.filter(g=>target.tg.includes(g)).length}))
        .filter(r=>r.overlap>=1)
        .sort((a,b)=>b.overlap-a.overlap)
        .slice(0,3);

    let h = `<div class="card" style="border:2px solid #0984e3; background:#f0f7ff;">
        <div style="font-size:10px;color:#0984e3;font-weight:600;margin-bottom:4px">📌 当前案例</div>
        <div class="title">${target.t}</div>
        <div class="meta">${target.tg.map(g=>`<span class="tg tg-blue">${g}</span>`).join(" ")} · ${target.m}</div>
        <div class="body">${target.s}</div>
    </div>`;

    h += `<div style="font-size:13px;color:#555;margin:12px 0 8px">最相似的 ${others.length} 条历史案例:</div>`;

    others.forEach(r => {
        const shared = r.tg.filter(g=>target.tg.includes(g));
        const diff = r.tg.filter(g=>!target.tg.includes(g));
        h += `<div class="card">
            <div class="title">${r.t} <span style="font-size:10px;color:#999;">· ${r.m}</span></div>
            <div class="meta">
                共有 ${shared.map(g=>`<span class="tg tg-green">${g}</span>`).join(" ")}
                ${diff.length ? `差异 `+diff.map(g=>`<span class="tg tg-red">${g}</span>`).join(" ") : ""}
            </div>
            <div class="body">${r.s.slice(0,100)}...</div>
        </div>`;
    });
    document.getElementById("c2").innerHTML = h;
}
document.getElementById("s2").addEventListener("change", renderCompare);
